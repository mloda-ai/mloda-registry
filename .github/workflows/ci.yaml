name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            toxenv: python310
          - python-version: "3.11"
            toxenv: python311
          - python-version: "3.12"
            toxenv: python312
          - python-version: "3.13"
            toxenv: python313

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv
        uv tool install tox --with tox-uv
    - name: Run tox
      run: tox -e ${{ matrix.toxenv }}
      timeout-minutes: 3
      env:
        PYTEST_WORKERS: "0"

  lint-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Lint docs
      run: python scripts/lint_docs.py
